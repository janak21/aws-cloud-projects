services:
  web:
    build: .
    ports:
      - "5001:5001"
    environment:
      - DB_HOST=db
      - DB_USER=janak
      - DB_NAME=app_db
      - DB_PASSWORD=mysecurepa55w0rd
      - DB_PORT=5432
    depends_on:
      - db
    networks:
      - backend
    
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: janak
      POSTGRES_PASSWORD: mysecurepa55w0rd
      POSTGRES_DB: app_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U janak -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend: